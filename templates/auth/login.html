{% extends "base.html" %}
{% block title %}Login - VidyaDesk ERP{% endblock %}
{% block content %}
<div class="auth-shell row justify-content-center align-items-center">
    <div class="col-md-6 col-lg-4">
        <div class="erp-panel auth-card">
            <div class="brand auth-brand mb-4">
                <span class="brand-mark"><i class="bi bi-mortarboard-fill"></i></span>
                <span><strong>VidyaDesk</strong><small>Institute Financial ERP</small></span>
            </div>
            <h1 class="h4 fw-bold mb-1">School Login</h1>
            <p class="text-muted mb-4">Access admissions, fee collections, receipts and reports for your school.</p>
            <form method="post">
                <div class="mb-3"><label class="form-label">Username</label><input class="form-control" name="username" required autofocus></div>
                <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
                <button class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i> Login to ERP</button>
            </form>
            <a class="btn btn-outline-primary w-100 mt-3" href="{{ url_for('auth.register_school') }}"><i class="bi bi-building-add"></i> Create School Account</a>
            <div class="text-center mt-3">
                <a class="auth-admin-link" href="{{ url_for('super_admin.login') }}"><i class="bi bi-shield-lock me-1"></i> Admin Panel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
