<div class="no-print d-flex justify-content-end gap-2 mb-3">

    <a class="btn btn-outline-success" href="{{ url_for('reports.export', report_name=export_name|default('receivable'), fmt='xlsx', academic_year=year) }}"><i class="bi bi-file-earmark-excel"></i> Export Excel</a>
