{% extends "base.html" %}
{% block title %}Super Admin Login - VidyaDesk{% endblock %}
{% block content %}
<div class="auth-shell row justify-content-center align-items-center">
    <div class="col-md-6 col-lg-4">
        <div class="erp-panel auth-card">
            <div class="brand auth-brand mb-4">
                <span class="brand-mark"><i class="bi bi-shield-lock-fill"></i></span>
                <span><strong>VidyaDesk</strong><small>Super Admin</small></span>
            </div>
            <h1 class="h4 fw-bold mb-1">Owner Login</h1>
            <p class="text-muted mb-4">Manage school approvals, billing, renewals and platform settings.</p>
            <form method="post">
                <div class="mb-3"><label class="form-label">Username</label><input class="form-control" name="username" required autofocus></div>
                <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
                <button class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i> Login as Super Admin</button>
            </form>
            <div class="small text-muted mt-3 text-center"><a href="{{ url_for('auth.login') }}">Back to school login</a></div>
        </div>
    </div>
</div>
{% endblock %}
