{% extends "super_admin/_layout.html" %}
{% block content %}
<h1 class="h4 mb-3">Global Settings</h1>
<form class="erp-panel row g-3" method="post">
    <div class="col-md-6"><label class="form-label">Software Name</label><input class="form-control" name="software_name" value="{{ settings.software_name or 'VidyaDesk' }}"></div>
    <div class="col-md-6 d-flex align-items-end"><label class="form-check mb-2"><input class="form-check-input" type="checkbox" name="maintenance_mode" {% if settings.maintenance_mode %}checked{% endif %}> Maintenance Mode</label></div>
    <div class="col-12"><label class="form-label">Email Settings</label><textarea class="form-control" name="email_settings" rows="3">{{ settings.email_settings }}</textarea></div>
    <div class="col-12"><label class="form-label">Payment Settings</label><textarea class="form-control" name="payment_settings" rows="3">{{ settings.payment_settings }}</textarea></div>
    <div class="col-12"><button class="btn btn-primary">Save Settings</button></div>
</form>
{% endblock %}
